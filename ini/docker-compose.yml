services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./storage:/var/www/storage
    networks:
      - network-ujikom
    depends_on:
      - db
    scale: 3
    # healthcheck:                          # Aktifkan jika dibutuhkan
    #   test: ["CMD", "curl", "-f", "http://localhost"]
    #   interval: 60s
    #   timeout: 10s
    #   retries: 3

  nginx:
    image: nginx:alpine
    container_name: ujikom_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - network-ujikom
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: ujikom_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: otoklik
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_PASSWORD: secret
      MYSQL_USER: otoklik
    volumes:
      - volume-ujikom:/var/lib/mysql
    ports:
      - '3306:3306'
    networks:
      - network-ujikom

networks:
  network-ujikom:
    driver: bridge

volumes:
  volume-ujikom:
    driver: local
